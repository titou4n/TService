{% extends 'base.html' %}

{% block content %}
    <ul>
        <li><a class="active" href="{{ url_for('home_connected') }}">Home</a></li>
        <li><a href="{{ url_for('personal_information') }}">Personal Information</a></li>
        <li><a href="{{ url_for('create_post') }}">Create a post</a></li>
    </ul>
    <br>
    <h2>{% block title %} Edit "{{ post['title'] }}" {% endblock %}</h2>
    <div class="post">
        <form method="post">
            <label for="title">Title</label>
            <br>
            <input class="input" type="text"
                name="title"
                placeholder="Post title"
                value="{{ request.form['title'] or post['title'] }}"></input>
            <br>
            <br>
            <label for="content">Post Content</label>
            <br>
            <textarea class="textarea" name="content"
                    placeholder="Post content"
                    rows="15"
                    cols="60"
                    >{{ request.form['content'] or post['content'] }}</textarea>
            <br>
            <br>
            <button class="button" type="submit">Submit</button>
        </form>

        <hr>
        <form action="{{ url_for('delete_post', id_post=post['id_post']) }}" method="POST">
            <input type="submit" value="Delete Post"
                    onclick="return confirm('Are you sure you want to delete this post?')">
        </form>
    </div>
    
{% endblock %}
