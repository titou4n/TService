{% extends 'base.html' %}
{% block content %}
       <nav>
              <a href="{{ url_for('login') }}">Login</a>
       </nav>
       <h2>{% block title %} Sign up {% endblock %}</h2>
       <div class="little_post">
              <form method="post">
                     <label for="username">Username</label>
                     <br>
                     <input class="input" type="text" name="username"
                            placeholder="Username"
                            value="{{ request.form['username'] }}"></input>
                     <br>
                     <br>
                     <label for="password">Password</label>
                     <br>
                     <input class="input" type="password" name="password"
                            placeholder="Password"
                            value="{{ request.form['password'] }}"></input>
                     <br>
                     <br>
                     <label for="verif_password">Verif password</label>
                     <br>
                     <input class="input" type="password" name="verif_password"
                            placeholder="Verif password"
                            value="{{ request.form['verif_password'] }}"></input>
                     <br>
                     <br>
                     <label for="name">Your Name</label>
                     <br>
                     <input class="input" type="text" name="name"
                            placeholder="Name"
                            value="{{ request.form['name'] }}"></input>
                     <br>
                     <br>
                     <input type="checkbox" id="contitions_uses" name="contitions_uses" value="{{ request.form['contitions_uses'] }}">
                     <label for="contitions_uses">I accept <a href="{{ url_for('conditions_uses') }}">Contitions Uses</a> of TitouService</label>
                     <br>
                     <br>
                     <button class="button" type="submit">Submit</button>
              </form>
              <p>
              Already an account ? <a href="{{ url_for('login') }}">Login</a>
              </p>
       </div>
{% endblock %}
