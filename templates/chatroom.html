{% extends 'base.html' %}

{% block content %}
    <ul>
        <li><a class="active" href="{{ url_for('home_connected') }}">Home</a></li>
        <li><a href="{{ url_for('personal_information') }}">Personal Information</a></li>
        <li><a href="{{ url_for('create_post') }}">Create a post</a></li>
  
    </ul>
    <br>
    <h2>{% block title %} Posts {% endblock %}</h2>
    {% for post in posts %}
        <div class='post'>
            <p>{{ post['created'] }}</p>
            <h4>Of : {{ post['name'] }}</h4>
            <h3>{{ post['title'] }}</h3>
            <p>{{ post['content'] }}</p>
            <a href="{{ url_for('edit_post', id_post=post['id_post'] ) }}">Edit</a>
        </div>
        <br>
    {% endfor %}
{% endblock %}
